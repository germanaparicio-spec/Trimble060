<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trimble 0-60</title>
  <style>
    :root {
      color-scheme: light;
      --navy: #0f172a;
      --blue: #0f4c81;
      --gold: #f4b400;
      --ink: #142132;
      --muted: #5a6b7f;
      --surface: rgba(255, 255, 255, 0.9);
      --line: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: white;
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(15, 76, 129, 0.92)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent);
    }

    main {
      width: min(100%, 760px);
      padding: 40px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--blue);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.75rem, 8vw, 4.75rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    p {
      margin: 0 auto;
      max-width: 38rem;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
    }

    .button.primary {
      color: var(--navy);
      background: var(--gold);
    }

    .button.secondary {
      color: var(--ink);
      border: 1px solid rgba(20, 33, 50, 0.12);
      background: white;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Dimensions User Conference</p>
    <h1>Trimble 0-60 Challenge</h1>
    <p>
      This landing page is here to point visitors to the official Trimble 0-60 Challenge webpage for the most current
      information, program details, and event updates.
    </p>
    <div class="actions">
      <a class="button primary" href="https://www.trimble.com/en/our-company/events/dimensions/experiences/0-60-challenge" target="_blank" rel="noreferrer">Visit Official Trimble Page</a>
      <a class="button secondary" href="https://github.com/germanaparicio-spec/Trimble060" target="_blank" rel="noreferrer">View GitHub Repo</a>
    </div>
  </main>
</body>
</html>
